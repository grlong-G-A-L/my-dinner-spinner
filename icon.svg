<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circle">
      <circle cx="256" cy="272" r="210"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#FFF8E1"/>
  <!-- Wheel slices -->
  <g clip-path="url(#circle)">
    <!-- Vegetables - green -->
    <path d="M256,272 L256,62 A210,210 0 0,1 437.9,167 Z" fill="#43A047"/>
    <!-- Fruits - orange -->
    <path d="M256,272 L437.9,167 A210,210 0 0,1 437.9,377 Z" fill="#FB8C00"/>
    <!-- Dairy - cyan -->
    <path d="M256,272 L437.9,377 A210,210 0 0,1 256,482 Z" fill="#00ACC1"/>
    <!-- Protein - red -->
    <path d="M256,272 L256,482 A210,210 0 0,1 74.1,377 Z" fill="#E53935"/>
    <!-- Grains - amber -->
    <path d="M256,272 L74.1,377 A210,210 0 0,1 74.1,167 Z" fill="#FFB300"/>
    <!-- Drinks - blue -->
    <path d="M256,272 L74.1,167 A210,210 0 0,1 256,62 Z" fill="#1E88E5"/>
  </g>
  <!-- Wheel border -->
  <circle cx="256" cy="272" r="210" fill="none" stroke="#fff" stroke-width="6"/>
  <!-- Center button -->
  <circle cx="256" cy="272" r="48" fill="#FF3D00" stroke="#fff" stroke-width="5"/>
  <text x="256" y="280" text-anchor="middle" fill="#fff" font-family="sans-serif" font-weight="bold" font-size="28">SPIN</text>
  <!-- Arrow at top -->
  <polygon points="256,38 236,8 276,8" fill="#FF3D00" stroke="#fff" stroke-width="2"/>
</svg>
